version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: kavachx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kavachx
      POSTGRES_PASSWORD: kavachx_secret
      POSTGRES_DB: kavachx_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kavachx -d kavachx_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: kavachx-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/kavachx_neo4j
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kavachx-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kavachx-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://kavachx:kavachx_secret@postgres:5432/kavachx_db
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: kavachx_neo4j
      REDIS_URL: redis://redis:6379
      JWT_SECRET: kavachx_jwt_super_secret_change_in_production
      ENVIRONMENT: development
      OPENAI_API_KEY: ""
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ml_models:/app/ml/models
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kavachx-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  ml_models:
